<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon & App Icon ── -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ── Theme Color (browser chrome / mobile status bar) ── -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />

    <!-- ── SEO ── -->
    <title>SkillProof | AI-Powered Skill Verification & GitHub Intelligence</title>
    <meta name="description" content="Verify technical skills with unprecedented precision using AI-driven resume analysis and real GitHub repository audit data." />
    <meta name="keywords" content="AI resume analysis, skill verification, GitHub audit, technical intelligence, developer assessment" />
    <meta name="author" content="AI Audit" />

    <!-- ── Open Graph / Social ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Audit | Skill Verification Platform" />
    <meta property="og:description" content="Bridging the gap between claimed skills and real-world repository audit data." />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Audit | Skill Verification Platform" />
    <meta name="twitter:description" content="Bridging the gap between claimed skills and real-world repository audit data." />

    <!-- ── Google Fonts (preconnect first for speed) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Inline Critical CSS: prevent flash of unstyled content ── -->
    <style>
      html { background: #000; color-scheme: dark; }
      html.light { background: #f8fafc; color-scheme: light; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
